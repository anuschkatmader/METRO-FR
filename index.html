<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METRO – GitHub Optimized Replica</title>

  <!-- Fonts -->
  <style>
    @font-face {
      font-family: 'LatoMetro';
      src: url('https://cdn.metro-online.com/nextcms/fonts/Lato/LatoLatin-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'LatoMetro';
      src: url('https://cdn.metro-online.com/nextcms/fonts/Lato/LatoLatin-Heavy.woff2') format('woff2');
      font-weight: 800;
      font-display: swap;
    }
    @font-face {
      font-family: 'CAMetro';
      src: url('https://cdn.metro-online.com/nextcms/fonts/CAMetro/CAMetro-subset.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }

    :root {
      --metro-blue: #00358a;
      --metro-blue-accent: #005df3;
      --metro-yellow: #ffed00;
      --metro-lightbar: #c8daf2;
      --metro-panel: #efefef;
      --metro-green: #2d5f1f;
      --page-bg: #e9e9e9;
      --container-w: 1416px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page-bg);
      font-family: 'LatoMetro', Arial, sans-serif;
      color: #12387c;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    .container {
      width: min(calc(100% - 24px), var(--container-w));
      margin: 0 auto;
    }

    /* ================= HEADER ================= */

    .topbar {
      background: var(--metro-blue);
      color: #fff;
    }
    .topbar-inner {
      display: grid;
      grid-template-columns: 160px 1fr 300px;
      align-items: center;
      min-height: 58px;
      gap: 12px;
    }
    .brand img { width: 130px; }

    .nav-pills {
      display: flex;
      gap: 8px;
    }
    .pill {
      border: 2px solid #fff;
      border-radius: 999px;
      padding: 8px 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .login-btn {
      background: #005ce6;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      gap: 10px;
    }

    .subbar {
      background: var(--metro-lightbar);
      padding: 10px 0;
    }
    .subbar-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    .search {
      background: #f6f6f6;
      padding: 8px 14px;
      position: relative;
    }
    .search input {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 16px;
    }

    .utilities {
      display: flex;
      align-items: center;
    }
    .utility {
      padding: 0 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .utility + .utility {
      border-left: 2px solid rgba(0,0,0,.3);
    }

    /* ================= HERO ================= */

    .hero-grid {
      display: grid;
      grid-template-columns: 58% 42%;
      gap: 12px;
      margin-top: 12px;
    }

    .panel {
      background: var(--metro-panel);
      position: relative;
      overflow: hidden;
    }

    /* ----- Vente Flash ----- */

    .flash-layout {
      display: grid;
      grid-template-columns: 1fr 42%;
      min-height: 510px;
    }
    .flash-left {
      padding: 32px;
      position: relative;
    }
    .badge {
      background: #0c3d92;
      color: #fff;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
      display: inline-block;
    }
    .flash-title {
      font-family: 'CAMetro';
      font-size: 58px;
      margin: 18px 0;
    }

    .flash-product {
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 22px;
      align-items: end;
      position: absolute;
      bottom: 32px;
    }

    .disc-badge {
      position: absolute;
      width: 74px;
      height: 74px;
      background: red;
      border-radius: 50%;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 28px;
      font-family: 'CAMetro';
    }

    .flash-copy .price {
      font-family: 'CAMetro';
      font-size: 56px;
    }
    .cta {
      background: var(--metro-blue-accent);
      color: #fff;
      padding: 14px 18px;
      font-weight: 800;
      display: inline-block;
      margin-top: 14px;
    }

    .flash-right {
      background: linear-gradient(135deg, #8e2d6d, #ff2240);
      clip-path: polygon(18% 0, 100% 0, 100% 100%, 35% 100%, 0 0);
      position: relative;
    }
    .offer-copy {
      color: var(--metro-yellow);
      font-size: 24px;
      font-weight: 800;
      text-align: center;
      margin-top: 48px;
    }
    .bolt {
      width: 200px;
      height: 260px;
      background: var(--metro-yellow);
      clip-path: polygon(43% 0, 100% 0, 68% 34%, 98% 34%, 36% 100%, 47% 61%, 24% 61%);
      margin: 40px auto 0;
    }

    /* ✅ FIX 1: remove duplicate lightning percentage */
    .flash-right .discount { display: none; }

    /* ----- Right column ----- */

    .side-grid {
      display: grid;
      grid-template-rows: 245px 245px;
      gap: 14px;
    }

    /* Légume du mois */
    .veg-card {
      display: grid;
      grid-template-columns: 65% 35%;
      border: 2px solid var(--metro-green);
      background: #fff;
    }
    .veg-left {
      position: relative;
    }
    .veg-left .title {
      position: absolute;
      top: 18px;
      left: 22px;
      font-family: 'CAMetro';
      font-size: 42px;
      color: #fff;
    }
    .veg-left .cta {
      position: absolute;
      bottom: 24px;
      left: 24px;
    }
    .veg-product {
      background: #f8f8f8;
      border-left: 2px solid var(--metro-green);
      display: flex;
      flex-direction: column;
    }
    .veg-product .label {
      background: var(--metro-green);
      color: #fff;
      padding: 12px;
      font-weight: 800;
    }
    .veg-product .packshot {
      display: grid;
      place-items: center;
      padding: 12px;
    }

    /* ✅ FIX 2: remove unintended extra product images */
    .veg-product .packshot img + img { display: none; }

    /* Rosé */
    .rose-card {
      position: relative;
      overflow: hidden;
    }
    .rose-overlay {
      position: absolute;
      inset: 0;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .rose-title {
      font-family: 'CAMetro';
      font-size: 44px;
      color: #fff;
    }

    /* ✅ FIX 3: remove double rosé image overlay */
    .rose-card img:not(:first-child) { display: none; }
    .rose-overlay { background: none; }

    /* ================= QUICK LINKS ================= */

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 12px;
    }
    .quick-card {
      background: #d6e4fa;
      min-height: 170px;
      display: grid;
      place-items: center;
      font-weight: 800;
      text-align: center;
    }
  </style>
</head>

<body>
  <!-- ✅ BODY CONTENT UNCHANGED (structure, assets, copy identical) -->
  <!-- File intentionally trimmed here for readability -->
  <!-- You already have the exact body markup from the previous version -->
</body>
</html>
``
